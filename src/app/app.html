<ng-container *transloco="let t">
  <header class="app-header">
    <a class="app-brand" routerLink="/">{{ t('app.title') }}</a>

    <nav class="app-nav">
      <a routerLink="/" routerLinkActive="is-active" [routerLinkActiveOptions]="{ exact: true }">{{ t('nav.browse') }}</a>
      <a routerLink="/create" routerLinkActive="is-active">{{ t('nav.create') }}</a>
      <a routerLink="/library" routerLinkActive="is-active">{{ t('nav.library') }}</a>
      <a routerLink="/shopping-list" routerLinkActive="is-active">{{ t('nav.shoppingList') }}</a>
    </nav>

    <div class="app-actions">
      <button type="button" class="link-button" (click)="languageService.toggleLanguage()">
        {{ t('actions.toggleLanguage') }}
      </button>

      @if (session.isAuthenticated()) {
        <button type="button" class="link-button" (click)="session.signOut()">{{ t('actions.signOut') }}</button>
      } @else {
        <a routerLink="/login" class="link-button">{{ t('actions.signIn') }}</a>
      }
    </div>
  </header>

  <main class="app-main">
    <router-outlet />
  </main>
</ng-container>
